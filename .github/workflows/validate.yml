name: validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need the parent commit so `git show --check` can diff the tip.
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Release metadata (SemVer/CHANGELOG coupling + plugin mirror)
        run: python3 scripts/validate_evidence.py

      - name: Docs database invariants
        run: python3 scripts/validate_docs_db.py

      - name: Whitespace guard (trailing whitespace / space-before-tab)
        run: git show --check HEAD
